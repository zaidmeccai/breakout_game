<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanushri Skate Dash</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, sans-serif;
        }
        #game {
            border: 2px solid #333;
            box-shadow: 0 0 30px rgba(255, 120, 180, 0.18);
        }
        /* Native 800x600 on desktop; scale down (keeping aspect) on smaller screens. */
        #game canvas {
            display: block;
            width: auto;
            height: auto;
            max-width: 100vw;
            max-height: 100vh;
        }
    </style>
</head>
<body>
    <div id="game"></div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <!-- Firebase (compat SDK — exposes the global `firebase` object). Powers the
         shared online leaderboard; reuses the same project as the Breakout game. -->
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
    <script src="skate.js"></script>
</body>
</html>
