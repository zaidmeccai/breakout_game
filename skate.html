<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tanushri Skate Dash</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            /* Soft gradient backdrop so the letterbox around the game feels
               intentional instead of a harsh black void. */
            background: radial-gradient(ellipse at center, #1c2a44 0%, #0a0f1f 100%);
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
            font-family: system-ui, -apple-system, sans-serif;
            color: #ffffff;
        }
        /* #game is the Phaser parent — fill the viewport so Phaser's FIT
           scaler has the whole screen to scale the 4:3 game canvas into. */
        #game {
            width: 100vw;
            height: 100vh;
        }
        #game canvas {
            display: block;
            touch-action: none;                       /* game owns touch gestures */
            -webkit-tap-highlight-color: transparent; /* no blue tap flash */
            user-select: none;
            -webkit-user-select: none;
        }
        /* Rotate-to-landscape hint shown only on portrait phones. */
        #rotate-hint {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(10, 15, 31, 0.96);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            padding: 32px;
        }
        #rotate-hint .phone {
            width: 56px;
            height: 92px;
            border: 3px solid #ffd34d;
            border-radius: 10px;
            margin-bottom: 22px;
            position: relative;
            animation: rot 2.6s ease-in-out infinite;
        }
        #rotate-hint .phone::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: 6px;
            transform: translateX(-50%);
            width: 10px;
            height: 10px;
            background: #ffd34d;
            border-radius: 50%;
        }
        #rotate-hint h2 { margin: 0 0 8px; font-size: 22px; font-weight: bold; }
        #rotate-hint p  { margin: 0; font-size: 15px; opacity: 0.85; max-width: 280px; line-height: 1.4; }
        @keyframes rot {
            0%, 30%   { transform: rotate(0deg); }
            60%, 100% { transform: rotate(-90deg); }
        }
        @media (orientation: portrait) and (max-width: 900px) {
            #rotate-hint { display: flex; }
        }
    </style>
</head>
<body>
    <div id="game"></div>
    <div id="rotate-hint">
        <div class="phone"></div>
        <h2>Rotate your phone</h2>
        <p>This game plays best in landscape — turn your phone sideways.</p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <!-- Firebase (compat SDK — exposes the global `firebase` object). Powers the
         shared online leaderboard; reuses the same project as the Breakout game. -->
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
    <script src="skate.js"></script>
</body>
</html>
